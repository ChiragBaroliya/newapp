name: React AI Documentation (Manual)

on:
  workflow_dispatch:   # ✅ Manual trigger only

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------
    # Checkout Code (FULL HISTORY FIX)
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true   # ✅ FIX for push

    # ----------------------------------------
    # Setup Node.js
    # ----------------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # ----------------------------------------
    # Install Dependencies
    # ----------------------------------------
    - name: Install dependencies
      run: npm install

    # ----------------------------------------
    # Disable CI strict mode (avoid ESLint fail)
    # ----------------------------------------
    - name: Disable CI warnings as errors
      run: echo "CI=false" >> $GITHUB_ENV

    # ----------------------------------------
    # Build React App
    # ----------------------------------------
    - name: Build project
      run: npm run build

    # ----------------------------------------
    # Install jq
    # ----------------------------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # ----------------------------------------
    # Generate AI Documentation (Groq)
    # ----------------------------------------
    - name: Generate AI Documentation
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        echo "🔍 Getting Git Diff..."

        # Prevent infinite loop
        if [[ "${{ github.event.head_commit.message }}" == *"Auto update documentation"* ]]; then
          echo "Skipping AI commit loop"
          exit 0
        fi

        # Check commit count
        COMMIT_COUNT=$(git rev-list --count HEAD)

        if [ "$COMMIT_COUNT" -lt 2 ]; then
          echo "Only one commit found. Using full repo content..."
          DIFF=$(git ls-files | xargs cat | head -c 12000)
        else
          DIFF=$(git diff HEAD~1 HEAD)
        fi

        if [ -z "$DIFF" ]; then
          echo "No changes detected. Skipping..."
          exit 0
        fi

        # Limit diff size
        DIFF=$(echo "$DIFF" | head -c 12000)

        echo "🤖 Calling Groq API..."

        RESPONSE=$(curl -s https://api.groq.com/openai/v1/responses \
          -H "Authorization: Bearer $GROQ_API_KEY" \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"openai/gpt-oss-20b\",
            \"input\": \"You are a senior software documentation engineer.

Analyze the following git diff and generate structured markdown documentation.

Include:
- Summary of changes
- Components affected
- Technical explanation

Git Diff:
$DIFF\"
          }")

        echo "🔍 Full API Response:"
        echo $RESPONSE

        DOC=$(echo $RESPONSE | jq -r '.output[0].content[0].text // .output_text // empty')

        if [ -z "$DOC" ] || [ "$DOC" == "null" ]; then
          echo "⚠️ Empty AI response. Using fallback."
          DOC="## AI Documentation\n\nNo meaningful documentation generated."
        fi

        mkdir -p docs
        echo "$DOC" > docs/auto-generated.md

        echo "📄 Documentation generated"

    # ----------------------------------------
    # Commit & Push Changes
    # ----------------------------------------
    - name: Commit documentation
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add docs/auto-generated.md

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Auto update documentation via AI"

        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

        git push
