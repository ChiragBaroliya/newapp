name: React AI Documentation (Manual)

on:
  workflow_dispatch:

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------
    # Checkout Code (FULL HISTORY)
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    # ----------------------------------------
    # Setup Node.js
    # ----------------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # ----------------------------------------
    # Install Dependencies
    # ----------------------------------------
    - name: Install dependencies
      run: npm install

    # ----------------------------------------
    # Disable CI strict mode
    # ----------------------------------------
    - name: Disable CI warnings as errors
      run: echo "CI=false" >> $GITHUB_ENV

    # ----------------------------------------
    # Build React App
    # ----------------------------------------
    - name: Build project
      run: npm run build

    # ----------------------------------------
    # Install jq
    # ----------------------------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # ----------------------------------------
    # Generate AI Documentation (Commit History Based)
    # ----------------------------------------
    - name: Generate AI Documentation
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        echo "📜 Getting commit history..."

        # Prevent infinite loop
        LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
        if [[ "$LAST_COMMIT_MSG" == *"Auto update documentation"* ]]; then
          echo "Skipping AI commit loop"
          exit 0
        fi

        # Get last 20 commits
        COMMITS=$(git log -20 --pretty=format:"Commit: %h%nAuthor: %an%nMessage: %s%nDate: %ad%n---")

        if [ -z "$COMMITS" ]; then
          echo "No commit history found"
          exit 0
        fi

        # Limit size (token safety)
        COMMITS=$(echo "$COMMITS" | head -c 12000)

        echo "🤖 Preparing Groq request..."

        # Safe JSON payload
        PAYLOAD=$(jq -n --arg commits "$COMMITS" '{
          model: "openai/gpt-oss-20b",
          input: ("You are a senior software documentation engineer.\n\nAnalyze the following commit history and generate structured project documentation.\n\nInclude:\n- Project overview\n- Features implemented\n- Components/modules affected\n- Key improvements\n- Technical summary\n\nCommit History:\n" + $commits)
        }')

        echo "🚀 Calling Groq API..."

        RESPONSE=$(curl -s https://api.groq.com/openai/v1/responses \
          -H "Authorization: Bearer $GROQ_API_KEY" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        echo "🔍 Full API Response:"
        echo $RESPONSE

        # Parse response
        DOC=$(echo $RESPONSE | jq -r '.output[0].content[0].text // .output_text // empty')

        # Fallback
        if [ -z "$DOC" ] || [ "$DOC" == "null" ]; then
          DOC="## AI Documentation\n\nNo meaningful documentation generated."
        fi

        mkdir -p docs

        echo "📄 Writing documentation..."

        echo "$DOC" > docs/auto-generated.md

    # ----------------------------------------
    # Commit & Push Changes
    # ----------------------------------------
    - name: Commit documentation
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add docs/auto-generated.md

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Auto update documentation via AI"

        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

        git push
