name: React AI Documentation (Manual)

on:
  workflow_dispatch:

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------
    # Checkout Code
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    # ----------------------------------------
    # Setup Node.js
    # ----------------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # ----------------------------------------
    # Install Dependencies
    # ----------------------------------------
    - name: Install dependencies
      run: npm install

    # ----------------------------------------
    # Disable CI strict mode
    # ----------------------------------------
    - name: Disable CI warnings as errors
      run: echo "CI=false" >> $GITHUB_ENV

    # ----------------------------------------
    # Build React App
    # ----------------------------------------
    - name: Build project
      run: npm run build

    # ----------------------------------------
    # Install jq
    # ----------------------------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # ----------------------------------------
    # Generate Feature-wise AI Documentation
    # ----------------------------------------
    - name: Generate AI Documentation (Feature Wise)
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        AI_PROMPT: |
          You are a senior software engineer.

          Generate FEATURE-WISE documentation ONLY for this commit.

          IMPORTANT RULES:
          - Do NOT explain entire project
          - Focus ONLY on this commit
          - If files are deleted → mention removal clearly
          - If feature added → explain feature
          - If bug fix → explain fix
          - Do NOT hallucinate

          OUTPUT FORMAT:

          ## 🚀 Feature / Change Summary

          ## 📂 Affected Files
          - file list

          ## 🔧 What Changed
          (Explain actual change)

          ## 🧠 Technical Details
          (Code-level explanation)

          ## ⚡ Impact
          (System impact / risk / improvement)

      run: |
        echo "📜 Getting last commit details..."

        LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
        LAST_COMMIT_HASH=$(git log -1 --pretty=%h)
        LAST_COMMIT_AUTHOR=$(git log -1 --pretty=%an)

        # Prevent infinite loop
        if [[ "$LAST_COMMIT_MSG" == *"Auto update documentation"* ]]; then
          echo "Skipping AI commit loop"
          exit 0
        fi

        # ✅ FULL DIFF (CRITICAL FIX)
        DIFF=$(git show HEAD)
        DIFF=$(echo "$DIFF" | head -c 12000)

        echo "🤖 Preparing Groq request..."

        PAYLOAD=$(jq -n \
          --arg prompt "$AI_PROMPT" \
          --arg msg "$LAST_COMMIT_MSG" \
          --arg diff "$DIFF" \
          '{
            model: "openai/gpt-oss-20b",
            input: ($prompt + "\n\nCommit Message:\n" + $msg + "\n\nCommit Diff:\n" + $diff)
          }')

        echo "🚀 Calling Groq API..."

        RESPONSE=$(curl -s https://api.groq.com/openai/v1/responses \
          -H "Authorization: Bearer $GROQ_API_KEY" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        echo "🔍 Raw Response:"
        echo $RESPONSE

        DOC=$(echo $RESPONSE | jq -r '.output[0].content[0].text // .output_text // empty')

        if [ -z "$DOC" ] || [ "$DOC" == "null" ]; then
          DOC="## ⚠️ AI Output Failed\nNo meaningful documentation generated."
        fi

        mkdir -p docs
        touch docs/auto-generated.md

        CURRENT_TIME=$(date "+%Y-%m-%d %H:%M:%S")

        echo "📄 Updating documentation..."

        {
          echo ""
          echo "## 📅 Update - $CURRENT_TIME"
          echo ""
          echo "**Commit:** $LAST_COMMIT_HASH"
          echo "**Author:** $LAST_COMMIT_AUTHOR"
          echo "**Message:** $LAST_COMMIT_MSG"
          echo ""
          echo "$DOC"
          echo ""
          echo "---"
        } >> docs/auto-generated.md

    # ----------------------------------------
    # Commit & Push Changes
    # ----------------------------------------
    - name: Commit documentation
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add docs/auto-generated.md

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Auto update documentation via AI"

        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

        git push
